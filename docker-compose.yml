version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: sehat-setu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sehat_setu
      POSTGRES_USER: sehat
      POSTGRES_PASSWORD: sehat123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'
    command: sh -c "npx prisma db push && npm run seed && node src/server.js"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
